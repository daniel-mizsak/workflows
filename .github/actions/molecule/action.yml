---
name: Molecule
description: "Run Molecule tests."
inputs:
  ANSIBLE_VAULT_PASSWORD_FILE:
    description: "Path to the Ansible vault password file."
    required: false

runs:
  using: composite
  steps:
    - name: Set up python.
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Upgrade pip.
      shell: bash
      run: >
        python -m pip install --upgrade pip

    - name: Install dependencies.
      shell: bash
      run: >
        pip install ansible molecule molecule-plugins[docker]

    - name: Run molecule.
      shell: bash
      run: >
        molecule test
      env:
        ANSIBLE_FORCE_COLOR: "1"
        ANSIBLE_VAULT_PASSWORD_FILE: ${{ inputs.ANSIBLE_VAULT_PASSWORD_FILE }}
        PY_COLORS: "1"
