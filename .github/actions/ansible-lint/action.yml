---
name: "Ansible Lint"
description: "Lint Ansible files using ansible-lint"

inputs:
  working_directory:
    description: "Directory for running action"
    required: false
  config_file:
    description: "Configuration file to use relative to the working directory"
    required: false
  strict:
    description: "Return non-zero exit code on warnings as well as errors"
    required: false

outputs:
  logs:
    description: "Logs of ansible-lint"

runs:
  using: "docker"
  image: "Dockerfile"
  args:
    - ${{ inputs.path }}
    - ${{ inputs.config_file }}
    - ${{ inputs.strict }}
