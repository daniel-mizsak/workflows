---
name: "Python CI/CD"

on:
  workflow_call:
    inputs:
      working_directory:
        description: "Directory for running the workflow"
        default: "."
        type: string

      python_versions:
        description: "List of python versions, must correspond to tox configuration"
        default: "['3.12']"
        type: string

      codecov:
        description: "Whether to run codecov after tests"
        default: false
        type: boolean

    secrets:
      CODECOV_TOKEN:
        description: "Token to use for codecov"
        required: false

jobs:
  tox:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    strategy:
      matrix:
        python-version: ${{ fromJson(inputs.python_versions) }}

    steps:
      - name: Check out the codebase
        uses: actions/checkout@v4

      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: >
          python -m pip install --upgrade pip

      - name: Install dependencies
        run: >
          pip install tox tox-gh

      - name: Run tests with tox
        run: >
          tox

      - name: Run codecov
        if: inputs.codecov
        uses: codecov/codecov-action@v5.1.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
