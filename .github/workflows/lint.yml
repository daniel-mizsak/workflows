---
name: Lint

on:
  workflow_call:
    inputs:
      megalinter-config:
        description: "Path to megalinter config file"
        default: "./.github/linters/.megalinter.yml"
        type: string

permissions: {}

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check out the codebase
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run megalinter
        uses: oxsecurity/megalinter/flavors/cupcake@0e3ce9b9c8c10effb9b269509cc47ca17cae31c7 # v9.5.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MEGALINTER_CONFIG: ${{ inputs.megalinter-config }}

          ACTION_ZIZMOR_UNSECURED_ENV_VARIABLES: GITHUB_TOKEN
