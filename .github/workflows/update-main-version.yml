---
name: Update Main Version

on:
  release:
    types: [released]

permissions: {}

jobs:
  update-main-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out the codebase
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Extract release info
        run: |
          set -euo pipefail

          RELEASE_TAG="${GITHUB_REF_NAME}"

          if ! echo "${RELEASE_TAG}" | grep --extended-regexp --quiet "^v[0-9]+\.[0-9]+\.[0-9]+$"; then
            echo "::error::Release tag '${RELEASE_TAG}' must match vMAJOR.MINOR.PATCH, for example v1.2.3"
            exit 1
          fi

          MAJOR_VERSION="$(echo "${RELEASE_TAG}" | grep --extended-regexp --only-matching "^v[0-9]+")"

          {
            echo "MAJOR_VERSION=${MAJOR_VERSION}"
            echo "RELEASE_TAG=${RELEASE_TAG}"
          } >> "${GITHUB_ENV}"

      - name: Tag new target
        run: >
          git tag --force "${MAJOR_VERSION}" "${RELEASE_TAG}"

      - name: Push tag
        run: >
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}" "${MAJOR_VERSION}"
