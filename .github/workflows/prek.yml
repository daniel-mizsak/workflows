---
name: Prek

on:
  workflow_call:
    inputs:
      extra-args:
        description: "Additional arguments for prek"
        default: "--all-files"
        type: string
      skip:
        description: "Comma-separated list of hooks or projects to skip"
        required: false
        type: string

permissions: {}

jobs:
  prek:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out the codebase
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          ignore-nothing-to-cache: true

      - name: Run prek
        uses: j178/prek-action@e98a699c41eb69ab013a45817a0406469a748f8d # v2.0.5
        with:
          extra-args: "${{ inputs.extra-args }}"
        env:
          PREK_SKIP: ${{ inputs.skip }}
