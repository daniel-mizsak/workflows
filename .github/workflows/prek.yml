---
name: Prek

on:
  workflow_call:
    inputs:
      extra-args:
        description: "Additional arguments for prek"
        default: "--all-files"
        type: string
      skip:
        description: "Comma-separated list of hooks or projects to skip"
        required: false
        type: string

permissions: {}

jobs:
  prek:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out the codebase
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run prek
        uses: j178/prek-action@cbc2f23eb5539cf20d82d1aabd0d0ecbcc56f4e3 # v2.0.2
        with:
          extra-args: "${{ inputs.extra-args }}"
        env:
          PREK_SKIP: ${{ inputs.skip }}
